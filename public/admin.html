<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>תיבת נח 2026 - ניהול משחק</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="noise"></div>

    <!-- ── Login ── -->
    <main class="app-shell" id="loginSection">
      <section class="card" style="max-width:440px;margin:60px auto">
        <h1>תיבת נח 2026 - כניסה לניהול</h1>
        <p class="subtitle">
          למנהל ראשי: השאר קוד משחק ריק.<br />
          למנהל משחק ספציפי: הזן גם קוד משחק.
        </p>
        <form id="loginForm">
          <label>
            שם משתמש
            <input id="loginUser" autocomplete="username" required />
          </label>
          <label>
            סיסמה
            <input id="loginPass" type="password" autocomplete="current-password" required />
          </label>
          <label>
            קוד משחק
            <input
              id="loginGame"
              maxlength="6"
              placeholder="XXXXXX — אופציונלי"
              style="text-transform:uppercase"
            />
          </label>
          <button type="submit" style="margin-top:14px;width:100%">כניסה</button>
          <p id="loginError" class="status" style="color:#dc2626;min-height:24px"></p>
        </form>
      </section>
    </main>

    <!-- ── Global admin view ── -->
    <main class="app-shell hidden" id="globalView">
      <section class="card">
        <div class="admin-header">
          <div>
            <h1>תיבת נח 2026 - ניהול ראשי</h1>
            <p class="subtitle">כל המשחקים הפעילים</p>
          </div>
          <button id="logoutGlobal" class="secondary">התנתק</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>חדר</th>
                <th>מנהל</th>
                <th>שחקנים</th>
                <th>נושא</th>
                <th>סטטוס</th>
                <th>נעילה בעוד</th>
                <th>סבב</th>
                <th>נקודות זוג</th>
              </tr>
            </thead>
            <tbody id="allGamesBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- ── Room admin view ── -->
    <main class="app-shell hidden" id="roomView">
      <section class="card">
        <div class="admin-header">
          <div>
            <h1>תיבת נח 2026 - ניהול חדר <span id="roomViewId"></span></h1>
            <p class="subtitle" id="roomViewSubtitle"></p>
            <p class="subtitle" id="roomCountdown"></p>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button id="replaceImageAdminBtn" class="secondary" style="display:none">החלף תמונה</button>
            <button id="logoutRoom" class="secondary">התנתק</button>
          </div>
        </div>

        <div id="roomWinnersBox" class="winners-box" style="display:none">
          <strong>מנצחי הסבבים:</strong>
          <div id="roomWinnersList"></div>
        </div>

        <h2 style="margin-top:16px">שחקנים (ממוינים לפי ניקוד)</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>שם</th>
                <th>ניקוד</th>
                <th>תיאור סבב אחרון</th>
                <th>פעולה</th>
              </tr>
            </thead>
            <tbody id="playersBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
