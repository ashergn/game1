<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>תיבת נח 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="noise"></div>
    <main class="app-shell">
      <section class="card" id="lobbyCard">
        <h1>תיבת נח 2026</h1>
        <p class="subtitle">המנהל יוצר חדר, שחקנים מצטרפים עם קוד חדר, ומנסים לכתוב אותו תיאור בן 2 מילים.</p>

        <label>
          השם שלך
          <input id="nameInput" maxlength="24" placeholder="הקלד שם" />
        </label>

        <div class="actions">
          <div class="create-box">
            <label>
              סיסמת משחק (לחדר חדש)
              <input id="createPassInput" type="password" maxlength="32" placeholder="בחר סיסמה לחדר" />
            </label>
            <button id="createRoomBtn">צור משחק חדש</button>
          </div>
          <div class="join-box">
            <input id="roomCodeInput" maxlength="6" placeholder="קוד חדר" style="text-transform:uppercase" />
            <button id="joinRoomBtn" class="secondary">הצטרף</button>
          </div>
        </div>

        <div id="shareArea" class="share-area hidden">
          <p>שתף את הקישור הזה עם שחקן 2:</p>
          <div class="share-row">
            <input id="shareLink" readonly />
            <button id="copyBtn" class="secondary">העתק</button>
          </div>
        </div>

        <p id="statusText" class="status">ממתין...</p>
      </section>

      <section class="card hidden" id="gameCard">
        <h1 class="game-title">תיבת נח 2026</h1>
        <div class="top-row">
          <div>
            <h2 id="roomLabel">חדר</h2>
            <p id="roundLabel" class="subtitle"></p>
          </div>
          <div class="top-actions">
            <button id="startRoundBtn" class="secondary hidden" type="button">התחל סבב</button>
            <div id="roundCountdown" class="countdown-pill hidden">נותרו 00:00</div>
            <button id="replaceImageBtn" class="secondary hidden" type="button">החלף סט תמונות</button>
            <div class="score-pill" id="scorePill">נקודות זוג: 0</div>
          </div>
        </div>

        <div id="subjectArea" class="subject-area">
          <label>
            נושא
            <input id="subjectInput" maxlength="60" placeholder="למשל: כלבים, חלל, מכוניות, ישראל" />
          </label>
          <button id="startBtn">התחל משחק</button>
        </div>

        <div id="managerPreview" class="manager-preview hidden">
          <label>
            נושא נוכחי:
            <input id="changeSubjectInput" maxlength="60" placeholder="הזן נושא חדש" />
          </label>
          <button id="changeSubjectBtn" class="secondary">החלף נושא</button>
          <label>
            זמן נעילת סבב (בשניות)
            <input id="roundDurationInput" type="number" min="10" max="600" step="1" value="60" />
          </label>
          <p id="managerPreviewHint" class="manager-preview-hint"></p>
          <div id="managerPreviewCounts" class="manager-preview-counts"></div>
          <div class="manager-preview-grid">
            <div class="manager-preview-card">
              <span>תמונה א</span>
              <img id="managerImageA" alt="תצוגה מקדימה לתמונה א" />
            </div>
            <div class="manager-preview-card">
              <span>תמונה ב</span>
              <img id="managerImageB" alt="תצוגה מקדימה לתמונה ב" />
            </div>
            <div class="manager-preview-card">
              <span>תמונה ג</span>
              <img id="managerImageC" alt="תצוגה מקדימה לתמונה ג" />
            </div>
          </div>
        </div>

        <div id="imageWrap" class="image-wrap hidden">
          <img id="gameImage" alt="תמונת סבב" />
        </div>

        <form id="guessForm" class="guess-form hidden">
          <label>
            תיאור (2 מילים)
            <input id="descriptionInput" maxlength="48" placeholder="למשל: שמח פרוותי" required />
          </label>
          <button type="submit">שלח תיאור</button>
        </form>

        <div id="resultBox" class="result-box"></div>

        <div class="players" id="playersList"></div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/client.js"></script>
  </body>
</html>
